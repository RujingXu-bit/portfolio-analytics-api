name: portfolio-analytics

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_local_only}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  postgres-test:
    image: postgres:16
    profiles: ["test"]
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-portfolio_test}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-portfolio_test_local_only}
      POSTGRES_USER: ${TEST_POSTGRES_USER:-portfolio_test}
    ports:
      - "${TEST_POSTGRES_PORT:-55433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  postgres-data:
